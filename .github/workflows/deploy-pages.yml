# Builds the React client and publishes it to GitHub Pages on every push to
# main. The API base URL comes from the repo variable API_BASE_URL
# (Settings → Secrets and variables → Actions → Variables).
name: Deploy client to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test -w server
      - run: npm run build -w client
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
          VITE_BASE: /valorant-tracker/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
